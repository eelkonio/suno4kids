{% extends "base.html" %}

{% block title %}Global Settings — Admin{% endblock %}

{% block extra_css %}
<style>
.admin-container { max-width: 600px; margin: 0 auto; padding: 20px; }
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.admin-header h2 { margin: 0; color: #333; }
.btn { display: inline-block; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.95rem; border: none; cursor: pointer; transition: background 0.15s; }
.btn-primary { background: #667eea; color: #fff; }
.btn-primary:hover { background: #5a6fd6; }
.btn-secondary { background: #e2e8f0; color: #333; }
.btn-secondary:hover { background: #cbd5e1; }

.form-card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.form-card h3 { margin: 0 0 16px; color: #333; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-weight: 600; color: #555; margin-bottom: 4px; font-size: 0.9rem; }
.form-group input[type="number"] {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 0.95rem; box-sizing: border-box;
}
.form-group input:focus { border-color: #667eea; outline: none; }
.form-hint { font-size: 0.8rem; color: #999; margin-top: 2px; }
</style>
{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h2>🌐 Global Settings</h2>
        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">← Back</a>
    </div>

    <div class="form-card">
        <h3>Default Settings</h3>
        <form method="post" action="{{ url_for('admin.save_settings') }}">
            <div class="form-group">
                <label for="default_max_projects">Default Max Projects per Profile</label>
                <input type="number" id="default_max_projects" name="default_max_projects_per_profile"
                       value="{{ settings.default_max_projects_per_profile }}" min="1">
                <div class="form-hint">This value is used as the default when creating new schools.</div>
            </div>
            <button type="submit" class="btn btn-primary">Save Settings</button>
        </form>
    </div>
</div>
{% endblock %}
