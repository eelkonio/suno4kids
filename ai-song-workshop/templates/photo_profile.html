{% extends "base.html" %}

{% block title %}Foto Fun - Naam invullen{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/photo_transform.css') }}">
{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 4rem auto;">
    <h2 style="text-align: center; color: #667eea; margin-bottom: 2rem;">
        📸 Welkom bij Foto Fun!
    </h2>

    <p style="text-align: center; margin-bottom: 2rem; color: #666;">
        Vul je naam in om te beginnen met het maken van gave foto's.
    </p>

    {% if error %}
    <div class="error-message">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('main.photo_transform_create_profile') }}" id="photoProfileForm">
        <div class="form-group">
            <label for="name" class="form-label">Jouw naam:</label>
            <input type="text" id="name" name="name" class="form-input"
                   placeholder="Typ hier je naam..." required autofocus>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">
            Start met Foto Fun! 📸
        </button>
    </form>
</div>
{% endblock %}
